<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주일학교 출석부</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#56ab2f">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 전체 기본 스타일 */
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        #app-container { width: 100%; max-width: 480px; background-color: #f4f7f6; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        
        /* 헤더 디자인 (예쁜 그라데이션과 둥근 모서리) */
        .header-bg { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); padding: 25px 20px 30px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; color: white; text-align: center; box-shadow: 0 4px 10px rgba(86, 171, 47, 0.2); }
        .header-bg h2 { margin: 0; font-size: 1.4em; font-weight: 700; letter-spacing: -0.5px; }
        
        /* 상단 메뉴 버튼 */
        .top-menu { display: flex; justify-content: center; gap: 10px; margin-top: -15px; padding: 0 20px; }
        .top-menu button { flex: 1; background: white; border: none; color: #444; font-weight: 600; font-size: 0.9em; padding: 12px 0; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.06); transition: transform 0.1s; }
        .top-menu button:active { transform: scale(0.97); }

        /* 리스트 스타일 (카드형 디자인) */
        .student-list { padding: 20px; padding-bottom: 90px; display: flex; flex-direction: column; gap: 12px; }
        .student-item { background: #fff; padding: 18px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; align-items: center; justify-content: space-between; transition: background 0.2s; }
        .student-name { font-weight: 700; font-size: 1.15em; color: #2c3e50; cursor: pointer; flex: 1; display: flex; align-items: center; gap: 8px; }
        .student-name::after { content: '›'; font-size: 1.2em; color: #ccc; margin-top: -2px; }
        
        /* 커스텀 체크박스 */
        .quick-check { display: flex; gap: 12px; }
        .quick-check label { font-size: 0.9em; color: #555; display: flex; align-items: center; gap: 6px; font-weight: 500; cursor: pointer; }
        .quick-check input[type="checkbox"] { width: 22px; height: 22px; accent-color: #56ab2f; cursor: pointer; border-radius: 6px; }

        /* 플로팅 버튼 (입체감 있는 버튼) */
        .fab { position: fixed; bottom: 25px; right: 25px; width: 56px; height: 56px; background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; box-shadow: 0 6px 16px rgba(252, 96, 118, 0.4); cursor: pointer; z-index: 100; border: none; transition: transform 0.2s; }
        .fab:active { transform: scale(0.9); }

        /* 모달 팝업 (부드러운 애니메이션 적용) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { background: white; width: 85%; max-width: 340px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-title { font-size: 1.2em; font-weight: 700; color: #333; margin-bottom: 15px; text-align: center; }
        .modal-content input { width: 100%; box-sizing: border-box; padding: 14px; margin: 6px 0; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 0.95em; font-family: 'Noto Sans KR', sans-serif; background-color: #fafafa; transition: border 0.2s; }
        .modal-content input:focus { border-color: #56ab2f; outline: none; background-color: #fff; }
        
        /* 버튼 그룹 */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { flex: 2; background: #56ab2f; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1em; }
        .btn-close { flex: 1; background: #e0e0e0; color: #555; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1em; }
        .btn-delete { width: 100%; background: transparent; color: #fc6076; border: 1px solid #fc6076; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 0.9em; display: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header-bg">
        <h2>🌱 주일학교 출석부</h2>
    </div>
    
    <div class="top-menu">
        <button onclick="showBirthdays()">🎂 생일 확인</button>
        <button onclick="showStats()">📊 출석 통계</button>
    </div>

    <div class="student-list" id="studentList">
        </div>

    <button class="fab" onclick="openModal()">+</button>
</div>

<div class="modal-overlay" id="profileModal">
    <div class="modal-content">
        <div class="modal-title">학생 상세 정보</div>
        <input type="hidden" id="editIndex">
        <input type="text" id="editName" placeholder="이름 (가나다순 자동 정렬)">
        <input type="tel" id="editPhone" placeholder="전화번호 (예: 010-1234-5678)">
        <input type="date" id="editBirth" title="생일">
        <input type="text" id="editMemo" placeholder="특이사항 및 기도제목 ✍️">
        
        <div class="btn-group">
            <button class="btn-save" onclick="saveProfile()">저장하기</button>
            <button class="btn-close" onclick="closeModal()">닫기</button>
        </div>
        <button class="btn-delete" id="deleteBtn" onclick="deleteProfile()">학생 삭제</button>
    </div>
</div>

<script>
    let students = JSON.parse(localStorage.getItem('sundaySchoolData_v2')) || [];

    function saveData() {
        localStorage.setItem('sundaySchoolData_v2', JSON.stringify(students));
    }

    function renderList() {
        const listDiv = document.getElementById('studentList');
        listDiv.innerHTML = '';

        // 가나다순 자동 정렬
        students.sort((a, b) => a.name.localeCompare(b.name, 'ko'));

        if(students.length === 0) {
            listDiv.innerHTML = '<div style="text-align:center; color:#999; padding: 30px 0;">등록된 학생이 없습니다.<br>우측 하단의 + 버튼을 눌러 추가해주세요.</div>';
        }

        students.forEach((student, index) => {
            const item = document.createElement('div');
            item.className = 'student-item';
            item.innerHTML = `
                <div class="student-name" onclick="openModal(${index})">${student.name}</div>
                <div class="quick-check">
                    <label><input type="checkbox" ${student.attendance ? 'checked' : ''} onchange="toggleCheck(${index}, 'attendance')"> 출석</label>
                    <label><input type="checkbox" ${student.memory ? 'checked' : ''} onchange="toggleCheck(${index}, 'memory')"> 요절</label>
                </div>
            `;
            listDiv.appendChild(item);
        });
        saveData();
    }

    function openModal(index = -1) {
        document.getElementById('profileModal').style.display = 'flex';
        const deleteBtn = document.getElementById('deleteBtn');

        if (index >= 0) {
            const s = students[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('editName').value = s.name;
            document.getElementById('editPhone').value = s.phone;
            document.getElementById('editBirth').value = s.birth;
            document.getElementById('editMemo').value = s.memo;
            deleteBtn.style.display = 'block'; // 수정 시 삭제버튼 표시
        } else {
            document.getElementById('editIndex').value = -1;
            document.getElementById('editName').value = '';
            document.getElementById('editPhone').value = '';
            document.getElementById('editBirth').value = '';
            document.getElementById('editMemo').value = '';
            deleteBtn.style.display = 'none'; // 새 학생 추가 시 삭제버튼 숨김
        }
    }

    function closeModal() { 
        document.getElementById('profileModal').style.display = 'none'; 
    }

    function saveProfile() {
        const index = parseInt(document.getElementById('editIndex').value);
        const name = document.getElementById('editName').value.trim();
        if (!name) return alert('이름을 입력해주세요.');

        const newData = {
            name: name,
            phone: document.getElementById('editPhone').value,
            birth: document.getElementById('editBirth').value,
            memo: document.getElementById('editMemo').value,
            attendance: index >= 0 ? students[index].attendance : false,
            memory: index >= 0 ? students[index].memory : false
        };

        if (index >= 0) students[index] = newData;
        else students.push(newData);

        renderList();
        closeModal();
    }

    function deleteProfile() {
        const index = parseInt(document.getElementById('editIndex').value);
        if (confirm(`'${students[index].name}' 학생을 목록에서 삭제하시겠습니까?`)) {
            students.splice(index, 1);
            renderList();
            closeModal();
        }
    }

    function toggleCheck(index, type) {
        students[index][type] = !students[index][type];
        saveData();
    }

    function showBirthdays() {
        const month = new Date().getMonth() + 1;
        const births = students.filter(s => s.birth && parseInt(s.birth.split('-')[1]) === month);
        alert(births.length ? `🎉 ${month}월 생일자:\n` + births.map(s => s.name).join(', ') : `이번 달(${month}월) 생일자가 없습니다.`);
    }

    function showStats() {
        const total = students.length;
        if(total === 0) return alert('등록된 학생이 없습니다.');
        const attended = students.filter(s => s.attendance).length;
        const rate = Math.round((attended / total) * 100);
        alert(`📊 오늘 출석 상황\n총 ${total}명 중 ${attended}명 출석 완료 (${rate}%)`);
    }

    window.onload = renderList;
</script>
</body>
</html>
